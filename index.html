<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Shop — Dynamic Pricing Engine</title>
  <meta name="description" content="Real-time dynamic pricing and recommendation engine demo" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            outfit: ["Outfit", "sans-serif"],
            playfair: ["Playfair Display", "serif"],
            mono: ["DM Mono", "monospace"],
          },
          colors: {
            gold: { DEFAULT: "#e2b96f", dark: "#c8973e", light: "#f0d49a" },
            surface: { DEFAULT: "#0a0a12", card: "rgba(255,255,255,0.03)", border: "rgba(255,255,255,0.07)" },
          },
        },
      },
    };
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0a0a12;
      overflow-x: hidden;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    .product-card {
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-5px);
      border-color: rgba(226, 185, 111, 0.4) !important;
      box-shadow: 0 16px 48px rgba(226, 185, 111, 0.1);
    }

    .sim-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
    }

    .sim-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sim-btn:hover::after {
      opacity: 1;
    }

    .sim-btn:active {
      transform: scale(0.96) !important;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(226, 185, 111, 0.2);
      border-top-color: #e2b96f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes flashGreen {
      0% {
        box-shadow: inset 0 0 0 2px rgba(74, 222, 128, 0.6);
      }

      100% {
        box-shadow: inset 0 0 0 2px transparent;
      }
    }

    @keyframes flashRed {
      0% {
        box-shadow: inset 0 0 0 2px rgba(248, 113, 113, 0.6);
      }

      100% {
        box-shadow: inset 0 0 0 2px transparent;
      }
    }

    .flash-up {
      animation: flashGreen 2s ease-out;
    }

    .flash-down {
      animation: flashRed 2s ease-out;
    }

    @keyframes slideIn {
      0% {
        opacity: 0;
        transform: translateX(12px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .rec-new {
      animation: slideIn 0.4s ease-out;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.65;
      }
    }

    .trending-badge {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes priceUp {
      0% {
        transform: scale(1.2);
        color: #4ade80;
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes priceDown {
      0% {
        transform: scale(1.2);
        color: #f87171;
      }

      100% {
        transform: scale(1);
      }
    }

    .price-flash-up {
      animation: priceUp 0.5s ease-out;
    }

    .price-flash-down {
      animation: priceDown 0.5s ease-out;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(226, 185, 111, 0.2);
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;
    const API_BASE = "";

    /* ── Product image gradients (no external images needed) ── */
    const GRADIENTS = [
      "linear-gradient(135deg, #1a1a3e 0%, #2d1b69 100%)",
      "linear-gradient(135deg, #16213e 0%, #0f3460 100%)",
      "linear-gradient(135deg, #0f3460 0%, #533483 100%)",
      "linear-gradient(135deg, #1a1a2e 0%, #e94560 50%, #533483 100%)",
      "linear-gradient(135deg, #16213e 0%, #1a1a3e 100%)",
      "linear-gradient(135deg, #0f3460 0%, #16213e 100%)",
      "linear-gradient(135deg, #533483 0%, #1a1a2e 100%)",
      "linear-gradient(135deg, #16213e 0%, #2d1b69 100%)",
    ];

    const MOCK_PRODUCTS = [
      { id: 1, name: "Wireless Headphones", price: 129.99, category: "Audio", emoji: "🎧" },
      { id: 2, name: "Mechanical Keyboard", price: 89.99, category: "Peripherals", emoji: "⌨️" },
      { id: 3, name: "Ultrawide Monitor", price: 499.99, category: "Display", emoji: "🖥️" },
      { id: 4, name: "Ergonomic Mouse", price: 59.99, category: "Peripherals", emoji: "🖱️" },
      { id: 5, name: "USB-C Hub", price: 45.99, category: "Accessories", emoji: "🔌" },
      { id: 6, name: "Webcam Pro 4K", price: 149.99, category: "Video", emoji: "📷" },
      { id: 7, name: "Standing Desk Mat", price: 34.99, category: "Ergonomics", emoji: "🟫" },
      { id: 8, name: "Laptop Stand", price: 29.99, category: "Accessories", emoji: "💻" },
    ];

    const REC_GRADIENTS = [
      "linear-gradient(135deg,#533483,#2d1b69)",
      "linear-gradient(135deg,#e84545,#b83030)",
      "linear-gradient(135deg,#2b9348,#1b6030)",
      "linear-gradient(135deg,#e76f51,#c44d30)",
      "linear-gradient(135deg,#023e8a,#0353a4)",
    ];
    const MOCK_RECOMMENDATIONS = [
      { id: 9, name: "Noise-Cancelling Buds", emoji: "🎵" },
      { id: 10, name: "Smart LED Strip", emoji: "💡" },
      { id: 11, name: "Desk Organizer", emoji: "📦" },
      { id: 12, name: "Cable Management Kit", emoji: "🔧" },
      { id: 13, name: "Monitor Light Bar", emoji: "🌟" },
    ];

    /* ── Components ── */

    function PriceTag({ price, flash, trending }) {
      const color = flash === "up" ? "#4ade80" : flash === "down" ? "#f87171" : "#e2b96f";
      const cls = flash === "up" ? "price-flash-up" : flash === "down" ? "price-flash-down" : "";
      return (
        <div className="flex items-center gap-2">
          <span className={`text-lg font-bold font-mono transition-colors duration-300 ${cls}`} style={{ color }}>
            ₹{Number(price).toFixed(2)}
          </span>
          {trending && (
            <span className="trending-badge text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-green-400/15 text-green-400 border border-green-400/30 tracking-wider">
              🔥 TREND
            </span>
          )}
        </div>
      );
    }

    function ProductCard({ product, index, isClicked, flashState }) {
      const flashClass = flashState === "up" ? "flash-up" : flashState === "down" ? "flash-down" : "";
      return (
        <div
          className={`product-card rounded-2xl overflow-hidden cursor-pointer relative ${flashClass}`}
          style={{
            background: isClicked ? "rgba(226,185,111,0.08)" : "rgba(255,255,255,0.03)",
            border: isClicked ? "1px solid rgba(226,185,111,0.5)" : "1px solid rgba(255,255,255,0.07)",
          }}
        >
          {isClicked && (
            <div className="absolute top-2 right-2 z-10 text-[9px] font-bold px-2 py-0.5 rounded-full tracking-widest" style={{ background: "rgba(226,185,111,0.9)", color: "#0a0a12" }}>
              SELECTED
            </div>
          )}
          {/* Gradient image area with centered emoji */}
          <div className="relative flex items-center justify-center" style={{ background: GRADIENTS[index % GRADIENTS.length], aspectRatio: "1", minHeight: 140 }}>
            <span className="text-5xl select-none drop-shadow-lg">{product.emoji}</span>
            <div className="absolute inset-0" style={{ background: "linear-gradient(to top, rgba(10,10,18,0.5) 0%, transparent 40%)" }} />
            <span className="absolute bottom-1.5 left-2.5 text-[9px] font-semibold text-white/50 tracking-[0.12em] uppercase">
              {product.category}
            </span>
          </div>
          <div className="px-3 py-2.5">
            <p className="text-[13px] font-medium text-white/90 leading-tight mb-1.5 m-0">{product.name}</p>
            <PriceTag price={product.price} flash={flashState} trending={flashState === "up"} />
          </div>
        </div>
      );
    }

    function RecommendationCard({ product, index, isNew }) {
      return (
        <div
          className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-300 ${isNew ? "rec-new" : ""}`}
          style={{
            background: isNew ? "rgba(226,185,111,0.06)" : "rgba(255,255,255,0.02)",
            border: isNew ? "1px solid rgba(226,185,111,0.3)" : "1px solid rgba(255,255,255,0.06)",
          }}
        >
          <div className="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 text-xl" style={{ background: REC_GRADIENTS[index % REC_GRADIENTS.length] }}>
            {product.emoji}
          </div>
          <div className="flex-1 min-w-0">
            <p className="text-[12px] font-medium text-white/85 truncate m-0">{product.name}</p>
            {isNew && <p className="text-[10px] text-gold mt-0.5 m-0">Just added</p>}
          </div>
          <span className="text-xs text-white/15">›</span>
        </div>
      );
    }

    function StatBox({ label, value }) {
      return (
        <div className="rounded-lg px-2.5 py-2" style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)" }}>
          <p className="text-[9px] tracking-[0.1em] text-white/30 font-medium m-0">{label}</p>
          <p className="text-base font-semibold font-mono text-gold m-0">{value}</p>
        </div>
      );
    }

    /* ── Main App ── */

    function App() {
      const [products, setProducts] = useState(MOCK_PRODUCTS);
      const [recommendations, setRecommendations] = useState(MOCK_RECOMMENDATIONS.slice(0, 4));
      const [loading, setLoading] = useState(false);
      const [clickedId, setClickedId] = useState(null);
      const [flashStates, setFlashStates] = useState({});
      const [newRecIds, setNewRecIds] = useState(new Set());
      const [lastAction, setLastAction] = useState(null);
      const [simCount, setSimCount] = useState(0);
      const [showLogin, setShowLogin] = useState(false);

      const simulateClick = useCallback(async () => {
        if (loading) return;
        setLoading(true);
        setSimCount((c) => c + 1);

        const randomProduct = products[Math.floor(Math.random() * products.length)];
        setClickedId(randomProduct.id);

        try {
          let newPrice = randomProduct.price;
          let priceChanged = false;

          try {
            const priceRes = await fetch(`${API_BASE}/price?product_id=${randomProduct.id}`);
            if (priceRes.ok) {
              const priceData = await priceRes.json();
              newPrice = priceData.price ?? newPrice;
              priceChanged = true;
            }
          } catch {
            const delta = Math.random() * 0.25 - 0.05;
            newPrice = +(randomProduct.price * (1 + delta)).toFixed(2);
            priceChanged = true;
          }

          const priceUp = newPrice > randomProduct.price;
          setLastAction(`${randomProduct.name}: ₹${randomProduct.price.toFixed(2)} → ₹${newPrice.toFixed(2)} ${priceUp ? "▲" : "▼"}`);

          if (priceChanged) {
            setFlashStates((prev) => ({ ...prev, [randomProduct.id]: priceUp ? "up" : "down" }));
            setProducts((prev) => prev.map((p) => (p.id === randomProduct.id ? { ...p, price: newPrice } : p)));
            setTimeout(() => setFlashStates((prev) => ({ ...prev, [randomProduct.id]: null })), 2500);
          }

          let newRecs = recommendations;
          try {
            const recRes = await fetch(`${API_BASE}/recommendations?user_id=1`);
            if (recRes.ok) {
              const recData = await recRes.json();
              newRecs = recData.recommendations ?? newRecs;
            }
          } catch {
            newRecs = [...MOCK_RECOMMENDATIONS].sort(() => Math.random() - 0.5).slice(0, 4);
          }

          const freshIds = new Set(newRecs.map((r) => r.id).filter((id) => !recommendations.find((r) => r.id === id)));
          setRecommendations(newRecs);
          setNewRecIds(freshIds);
          setTimeout(() => setNewRecIds(new Set()), 3000);
        } finally {
          setLoading(false);
        }
      }, [products, recommendations, loading]);

      const avgPrice = (products.reduce((s, p) => s + p.price, 0) / products.length).toFixed(0);

      return (
        <div className="min-h-screen font-outfit text-white" style={{ background: "#0a0a12" }}>

          {/* ── Sticky Header ── */}
          <header className="sticky top-0 z-50 flex items-center justify-between px-6 py-3" style={{ borderBottom: "1px solid rgba(255,255,255,0.06)", background: "rgba(10,10,18,0.88)", backdropFilter: "blur(14px)" }}>
            <div className="flex items-center gap-3">
              <div className="w-7 h-7 rounded-md flex items-center justify-center text-sm" style={{ background: "linear-gradient(135deg, #e2b96f, #c8973e)" }}>◈</div>
              <span className="font-playfair text-lg text-gold">Smart Shop</span>
              <span className="text-[10px] text-white/25 tracking-[0.15em] hidden sm:inline">FASTER PRICING, FAIRER DECISIONS, MEASURABLE RESULTS</span>
            </div>

            <div className="flex items-center gap-4">
              {/* Last action ticker */}
              {lastAction && (
                <span className="text-[11px] text-white/35 font-mono hidden md:inline truncate max-w-xs">
                  {lastAction}
                </span>
              )}

              {/* Sim counter */}
              <div className="text-right">
                <p className="text-[9px] text-white/25 tracking-[0.1em] m-0 leading-none">RUNS</p>
                <p className="text-lg font-mono text-gold font-medium m-0 leading-tight">{String(simCount).padStart(3, "0")}</p>
              </div>

              {/* Login Button */}
              <button
                className="sim-btn rounded-xl px-4 py-2.5 text-[13px] font-semibold tracking-wide border-none"
                onClick={() => setShowLogin(true)}
                style={{
                  background: "rgba(255,255,255,0.05)",
                  color: "#e2b96f",
                  border: "1px solid rgba(226,185,111,0.3)",
                  fontFamily: "Outfit, sans-serif",
                }}
              >
                🔐 Login
              </button>

              {/* Simulate Button — right in the header */}
              <button
                id="simulate-btn"
                className="sim-btn rounded-xl px-5 py-2.5 text-[13px] font-semibold tracking-wide border-none flex items-center gap-2"
                onClick={simulateClick}
                disabled={loading}
                style={{
                  background: loading ? "rgba(226,185,111,0.1)" : "linear-gradient(135deg, #e2b96f 0%, #c8973e 100%)",
                  color: loading ? "rgba(226,185,111,0.5)" : "#0a0a12",
                  cursor: loading ? "not-allowed" : "pointer",
                  fontFamily: "Outfit, sans-serif",
                }}
              >
                {loading && <div className="spinner" />}
                {loading ? "Processing…" : "⚡ Simulate Click"}
              </button>
            </div>
          </header>

          {/* ── Main Content ── */}
          <div className="max-w-screen-xl mx-auto px-6 pt-5 pb-12">
            <div className="grid gap-6 items-start" style={{ gridTemplateColumns: "1fr 280px" }}>

              {/* ── Product Grid ── */}
              <section>
                <div className="flex items-center justify-between mb-4">
                  <div>
                    <h1 className="text-[13px] tracking-[0.15em] text-white/30 font-medium m-0">CATALOG</h1>
                    <p className="text-xl font-semibold text-white mt-0.5 m-0">{products.length} Products</p>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <div className="w-1.5 h-1.5 rounded-full" style={{ background: "#4ade80", boxShadow: "0 0 4px rgba(74,222,128,0.6)" }} />
                    <span className="text-[10px] text-white/25 font-mono">connected</span>
                  </div>
                </div>

                <div className="grid gap-3" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(175px, 1fr))" }}>
                  {products.map((product, i) => (
                    <ProductCard
                      key={product.id}
                      product={product}
                      index={i}
                      isClicked={product.id === clickedId}
                      flashState={flashStates[product.id] ?? null}
                    />
                  ))}
                </div>
              </section>

              {/* ── Sidebar ── */}
              <aside className="sticky top-16">
                <div className="mb-3">
                  <h2 className="text-[13px] tracking-[0.15em] text-white/30 font-medium m-0">AI PICKS</h2>
                  <p className="text-xl font-semibold text-white mt-0.5 m-0">Recommended</p>
                </div>

                <div className="flex flex-col gap-1.5">
                  {recommendations.map((rec, i) => (
                    <RecommendationCard key={rec.id} product={rec} index={i} isNew={newRecIds.has(rec.id)} />
                  ))}
                </div>

                {/* Stats */}
                <div className="grid grid-cols-2 gap-2 mt-5">
                  <StatBox label="AVG PRICE" value={`₹${avgPrice}`} />
                  <StatBox label="UPDATES" value={simCount} />
                  <StatBox label="PRODUCTS" value={products.length} />
                  <StatBox label="TRENDING" value={Object.values(flashStates).filter((v) => v === "up").length} />
                </div>

                {/* API Status */}
                <div className="mt-3 px-3 py-2.5 rounded-lg flex items-center gap-2" style={{ background: "rgba(74,222,128,0.04)", border: "1px solid rgba(74,222,128,0.12)" }}>
                  <div className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: "#4ade80", boxShadow: "0 0 5px rgba(74,222,128,0.6)" }} />
                  <div>
                    <p className="text-[11px] text-green-400/80 font-medium m-0">Live simulation active</p>
                    <p className="text-[10px] text-white/20 m-0">Mock fallback on API failure</p>
                  </div>
                </div>
              </aside>

            </div>
          </div>

          {/* Login Modal */}
          {showLogin && (
            <div className="fixed inset-0 z-50 flex items-center justify-center" style={{ background: "rgba(10,10,18,0.8)", backdropFilter: "blur(8px)" }}>
              <div className="bg-surface-card rounded-2xl p-8 max-w-md w-full mx-4 relative" style={{ border: "1px solid rgba(255,255,255,0.07)" }}>
                {/* Close button */}
                <button
                  onClick={() => setShowLogin(false)}
                  className="absolute top-4 right-4 text-white/40 hover:text-white/70 transition-colors"
                >
                  ✕
                </button>

                {/* Header */}
                <div className="text-center mb-6">
                  <div className="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3" style={{ background: "linear-gradient(135deg, #e2b96f, #c8973e)" }}>
                    🔐
                  </div>
                  <h2 className="text-xl font-playfair text-gold mb-1">Welcome Back</h2>
                  <p className="text-sm text-white/60">Sign in to your Smart Shop account</p>
                </div>

                {/* Login Form */}
                <form className="space-y-4">
                  {/* Email/Mobile Input */}
                  <div>
                    <label className="block text-sm font-medium text-white/80 mb-2">Email or Mobile Number</label>
                    <input
                      type="text"
                      placeholder="Enter email or mobile number"
                      className="w-full px-4 py-3 rounded-xl bg-surface border text-white placeholder-white/40 focus:outline-none focus:ring-2 transition-all"
                      style={{
                        borderColor: "rgba(255,255,255,0.07)",
                        background: "rgba(255,255,255,0.03)",
                        fontFamily: "Outfit, sans-serif"
                      }}
                    />
                  </div>

                  {/* Password Input */}
                  <div>
                    <label className="block text-sm font-medium text-white/80 mb-2">Password</label>
                    <input
                      type="password"
                      placeholder="Enter your password"
                      className="w-full px-4 py-3 rounded-xl bg-surface border text-white placeholder-white/40 focus:outline-none focus:ring-2 transition-all"
                      style={{
                        borderColor: "rgba(255,255,255,0.07)",
                        background: "rgba(255,255,255,0.03)",
                        fontFamily: "Outfit, sans-serif"
                      }}
                    />
                  </div>

                  {/* Remember me & Forgot password */}
                  <div className="flex items-center justify-between text-sm">
                    <label className="flex items-center gap-2 text-white/60">
                      <input type="checkbox" className="rounded" />
                      Remember me
                    </label>
                    <a href="#" className="text-gold hover:text-gold-light transition-colors">Forgot password?</a>
                  </div>

                  {/* Login Button */}
                  <button
                    type="submit"
                    className="w-full py-3 rounded-xl font-semibold text-sm tracking-wide transition-all"
                    style={{
                      background: "linear-gradient(135deg, #e2b96f 0%, #c8973e 100%)",
                      color: "#0a0a12",
                      fontFamily: "Outfit, sans-serif"
                    }}
                  >
                    Sign In
                  </button>

                  {/* Sign up link */}
                  <div className="text-center text-sm text-white/60">
                    Don't have an account? <a href="#" className="text-gold hover:text-gold-light transition-colors">Sign up</a>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>

</html>
