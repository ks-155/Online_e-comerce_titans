<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEX — Dynamic Pricing Engine</title>
  <meta name="description" content="Real-time dynamic pricing, personalized recommendations, and A/B testing engine" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            outfit: ["Outfit", "sans-serif"],
            playfair: ["Playfair Display", "serif"],
            mono: ["DM Mono", "monospace"],
          },
          colors: {
            gold: { DEFAULT: "#e2b96f", dark: "#c8973e", light: "#f0d49a" },
            surface: { DEFAULT: "#0a0a12", card: "rgba(255,255,255,0.03)", border: "rgba(255,255,255,0.07)" },
          },
        },
      },
    };
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0a0a12;
      overflow-x: hidden;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    .product-card {
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
      border-color: rgba(226, 185, 111, 0.4) !important;
      box-shadow: 0 16px 48px rgba(226, 185, 111, 0.08);
    }

    .sim-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
    }

    .sim-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sim-btn:hover::after {
      opacity: 1;
    }

    .sim-btn:active {
      transform: scale(0.96) !important;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(226, 185, 111, 0.2);
      border-top-color: #e2b96f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes flashGreen {
      0% {
        box-shadow: inset 0 0 0 2px rgba(74, 222, 128, 0.6);
      }

      100% {
        box-shadow: inset 0 0 0 2px transparent;
      }
    }

    @keyframes flashRed {
      0% {
        box-shadow: inset 0 0 0 2px rgba(248, 113, 113, 0.6);
      }

      100% {
        box-shadow: inset 0 0 0 2px transparent;
      }
    }

    .flash-up {
      animation: flashGreen 2s ease-out;
    }

    .flash-down {
      animation: flashRed 2s ease-out;
    }

    @keyframes slideIn {
      0% {
        opacity: 0;
        transform: translateX(12px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .rec-new {
      animation: slideIn 0.4s ease-out;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.65;
      }
    }

    .trending-badge {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes priceUp {
      0% {
        transform: scale(1.2);
        color: #4ade80;
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes priceDown {
      0% {
        transform: scale(1.2);
        color: #f87171;
      }

      100% {
        transform: scale(1);
      }
    }

    .price-flash-up {
      animation: priceUp 0.5s ease-out;
    }

    .price-flash-down {
      animation: priceDown 0.5s ease-out;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(8px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(226, 185, 111, 0.2);
      border-radius: 4px;
    }

    .tab-active {
      border-bottom: 2px solid #e2b96f;
      color: #e2b96f;
    }

    .tab-inactive {
      border-bottom: 2px solid transparent;
      color: rgba(255, 255, 255, 0.3);
    }

    .tab-inactive:hover {
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef } = React;
    const API_BASE = "";

    /* ── Emoji map by category ── */
    const CATEGORY_EMOJI = {
      "Electronics": "💻", "Fashion": "👗", "Beauty": "💄", "Sports": "⚽",
      "Books": "📚", "Home & Kitchen": "🏠", "Toys": "🧸", "Beauty & Health": "💊",
      "Books & Media": "📖", default: "📦",
    };
    const getEmoji = (cat) => CATEGORY_EMOJI[cat] || CATEGORY_EMOJI.default;

    const GRADIENTS = [
      "linear-gradient(135deg, #1a1a3e 0%, #2d1b69 100%)",
      "linear-gradient(135deg, #16213e 0%, #0f3460 100%)",
      "linear-gradient(135deg, #0f3460 0%, #533483 100%)",
      "linear-gradient(135deg, #1a1a2e 0%, #e94560 50%, #533483 100%)",
      "linear-gradient(135deg, #16213e 0%, #1a1a3e 100%)",
      "linear-gradient(135deg, #0f3460 0%, #16213e 100%)",
      "linear-gradient(135deg, #533483 0%, #1a1a2e 100%)",
      "linear-gradient(135deg, #16213e 0%, #2d1b69 100%)",
      "linear-gradient(135deg, #2d1b69 0%, #0f3460 100%)",
      "linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)",
    ];

    const REC_GRADIENTS = [
      "linear-gradient(135deg,#533483,#2d1b69)",
      "linear-gradient(135deg,#e84545,#b83030)",
      "linear-gradient(135deg,#2b9348,#1b6030)",
      "linear-gradient(135deg,#e76f51,#c44d30)",
      "linear-gradient(135deg,#023e8a,#0353a4)",
    ];

    /* ── Components ── */

    function PriceTag({ price, basePrice, flash, trending }) {
      const color = flash === "up" ? "#4ade80" : flash === "down" ? "#f87171" : "#e2b96f";
      const cls = flash === "up" ? "price-flash-up" : flash === "down" ? "price-flash-down" : "";
      const pctChange = basePrice ? (((price - basePrice) / basePrice) * 100).toFixed(1) : 0;
      const showPct = Math.abs(pctChange) > 0.5;

      return (
        <div className="flex items-center gap-2 flex-wrap">
          <span className={`text-lg font-bold font-mono transition-colors duration-300 ${cls}`} style={{ color }}>
            ${Number(price).toFixed(2)}
          </span>
          {showPct && (
            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full ${pctChange > 0 ? "bg-green-400/15 text-green-400 border border-green-400/30" :
                "bg-red-400/15 text-red-400 border border-red-400/30"
              }`}>
              {pctChange > 0 ? "+" : ""}{pctChange}%
            </span>
          )}
          {trending && (
            <span className="trending-badge text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-orange-400/15 text-orange-400 border border-orange-400/30 tracking-wider">
              🔥 HOT
            </span>
          )}
        </div>
      );
    }

    function ProductCard({ product, index, isClicked, flashState, onClick }) {
      const flashClass = flashState === "up" ? "flash-up" : flashState === "down" ? "flash-down" : "";
      return (
        <div
          className={`product-card rounded-2xl overflow-hidden cursor-pointer relative ${flashClass}`}
          style={{
            background: isClicked ? "rgba(226,185,111,0.08)" : "rgba(255,255,255,0.03)",
            border: isClicked ? "1px solid rgba(226,185,111,0.5)" : "1px solid rgba(255,255,255,0.07)",
          }}
          onClick={() => onClick(product)}
        >
          {isClicked && (
            <div className="absolute top-2 right-2 z-10 text-[9px] font-bold px-2 py-0.5 rounded-full tracking-widest" style={{ background: "rgba(226,185,111,0.9)", color: "#0a0a12" }}>
              SELECTED
            </div>
          )}
          <div className="relative flex items-center justify-center" style={{ background: GRADIENTS[index % GRADIENTS.length], aspectRatio: "1", minHeight: 120 }}>
            <span className="text-4xl select-none drop-shadow-lg">{getEmoji(product.category)}</span>
            <div className="absolute inset-0" style={{ background: "linear-gradient(to top, rgba(10,10,18,0.5) 0%, transparent 40%)" }} />
            <span className="absolute bottom-1.5 left-2.5 text-[9px] font-semibold text-white/50 tracking-[0.12em] uppercase">
              {product.category}
            </span>
            {product.clicks > 3 && (
              <span className="absolute top-2 left-2 text-[8px] font-bold px-1.5 py-0.5 rounded bg-purple-500/80 text-white">
                {product.clicks} clicks
              </span>
            )}
          </div>
          <div className="px-3 py-2.5">
            <p className="text-[12px] font-medium text-white/90 leading-tight mb-1 m-0 truncate" title={product.name}>
              {product.name.length > 30 ? product.name.substring(0, 30) + "…" : product.name}
            </p>
            <p className="text-[10px] text-white/30 mb-1 m-0">{product.brand}</p>
            <PriceTag
              price={product.current_price}
              basePrice={product.base_price}
              flash={flashState}
              trending={product.clicks > 5}
            />
          </div>
        </div>
      );
    }

    function RecommendationCard({ rec, index, isNew }) {
      return (
        <div
          className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-300 ${isNew ? "rec-new" : ""}`}
          style={{
            background: isNew ? "rgba(226,185,111,0.06)" : "rgba(255,255,255,0.02)",
            border: isNew ? "1px solid rgba(226,185,111,0.3)" : "1px solid rgba(255,255,255,0.06)",
          }}
        >
          <div className="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 text-xl" style={{ background: REC_GRADIENTS[index % REC_GRADIENTS.length] }}>
            {getEmoji(rec.category)}
          </div>
          <div className="flex-1 min-w-0">
            <p className="text-[11px] font-medium text-white/85 truncate m-0">{rec.name}</p>
            <p className="text-[9px] text-white/30 m-0">{rec.reason || rec.category}</p>
            {rec.price && <p className="text-[11px] font-mono text-gold m-0">${Number(rec.price).toFixed(2)}</p>}
          </div>
        </div>
      );
    }

    function RationaleBox({ rationale }) {
      if (!rationale || rationale.length === 0) return null;
      return (
        <div className="fade-in rounded-xl px-4 py-3 mt-3" style={{ background: "rgba(226,185,111,0.04)", border: "1px solid rgba(226,185,111,0.15)" }}>
          <p className="text-[10px] tracking-[0.12em] text-gold/60 font-semibold mb-2 m-0">PRICE RATIONALE</p>
          {rationale.map((r, i) => (
            <p key={i} className="text-[11px] text-white/70 m-0 mb-1 leading-snug">{r}</p>
          ))}
        </div>
      );
    }

    function StatBox({ label, value, color }) {
      return (
        <div className="rounded-lg px-2.5 py-2" style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)" }}>
          <p className="text-[9px] tracking-[0.1em] text-white/30 font-medium m-0">{label}</p>
          <p className="text-base font-semibold font-mono m-0" style={{ color: color || "#e2b96f" }}>{value}</p>
        </div>
      );
    }

    function ABTestPanel({ analytics }) {
      if (!analytics) return null;
      const { ab_test } = analytics;
      return (
        <div className="fade-in rounded-xl px-4 py-3 mt-3" style={{ background: "rgba(74,222,128,0.03)", border: "1px solid rgba(74,222,128,0.1)" }}>
          <p className="text-[10px] tracking-[0.12em] text-green-400/60 font-semibold mb-2 m-0">A/B TEST RESULTS</p>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <p className="text-[10px] text-white/40 m-0">Group A (Static)</p>
              <p className="text-sm font-mono text-white/70 m-0">{ab_test.group_a_static.conversion_rate}% conv</p>
              <p className="text-[10px] text-white/30 m-0">{ab_test.group_a_static.sessions} sessions</p>
            </div>
            <div>
              <p className="text-[10px] text-white/40 m-0">Group B (Dynamic)</p>
              <p className="text-sm font-mono text-green-400 m-0">{ab_test.group_b_dynamic.conversion_rate}% conv</p>
              <p className="text-[10px] text-white/30 m-0">{ab_test.group_b_dynamic.sessions} sessions</p>
            </div>
          </div>
          <p className="text-[11px] text-green-400/80 mt-2 m-0 font-medium">{ab_test.summary}</p>
        </div>
      );
    }

    function EventLog({ events }) {
      if (!events || events.length === 0) return null;
      return (
        <div className="mt-3 rounded-xl px-4 py-3" style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)" }}>
          <p className="text-[10px] tracking-[0.12em] text-white/30 font-semibold mb-2 m-0">EVENT LOG</p>
          {events.slice(-5).reverse().map((evt, i) => (
            <div key={i} className="flex items-center justify-between py-1" style={{ borderBottom: i < 4 ? "1px solid rgba(255,255,255,0.04)" : "none" }}>
              <div className="flex items-center gap-2">
                <span className={`text-[10px] font-mono ${evt.direction === "up" ? "text-green-400" : evt.direction === "down" ? "text-red-400" : "text-white/30"}`}>
                  {evt.direction === "up" ? "▲" : evt.direction === "down" ? "▼" : "─"}
                </span>
                <span className="text-[10px] text-white/50 truncate max-w-[120px]">{evt.product_name}</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-[10px] font-mono text-white/30">{evt.latency_ms}ms</span>
                <span className={`text-[9px] px-1.5 py-0.5 rounded font-bold ${evt.ab_group === "B" ? "bg-green-400/10 text-green-400" : "bg-blue-400/10 text-blue-400"}`}>
                  {evt.ab_group}
                </span>
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* ── Main App ── */

    function App() {
      const [products, setProducts] = useState([]);
      const [recommendations, setRecommendations] = useState([]);
      const [loading, setLoading] = useState(false);
      const [initialLoading, setInitialLoading] = useState(true);
      const [clickedId, setClickedId] = useState(null);
      const [flashStates, setFlashStates] = useState({});
      const [newRecIds, setNewRecIds] = useState(new Set());
      const [lastAction, setLastAction] = useState(null);
      const [simCount, setSimCount] = useState(0);
      const [rationale, setRationale] = useState([]);
      const [eventLog, setEventLog] = useState([]);
      const [analytics, setAnalytics] = useState(null);
      const [avgLatency, setAvgLatency] = useState(0);
      const [connected, setConnected] = useState(false);
      const [activeTab, setActiveTab] = useState("recs");
      const sessionId = useRef("S" + Math.floor(Math.random() * 10000));
      const userId = useRef("U" + Math.floor(Math.random() * 500));
      const latencies = useRef([]);

      // ── Load products on mount ──
      useEffect(() => {
        async function loadProducts() {
          try {
            const res = await fetch(`${API_BASE}/products?limit=20`);
            if (res.ok) {
              const data = await res.json();
              setProducts(data.products || []);
              setConnected(true);
            }
          } catch (e) {
            console.warn("API not available, using demo mode");
            setConnected(false);
          } finally {
            setInitialLoading(false);
          }
        }
        loadProducts();
      }, []);

      // ── Click a specific product card ──
      const clickProduct = useCallback(async (product) => {
        if (loading) return;
        setLoading(true);
        setSimCount((c) => c + 1);
        setClickedId(product.sku_id);

        const eventTypes = ["click", "click", "click", "view", "add_to_cart", "purchase"];
        const eventType = eventTypes[Math.floor(Math.random() * eventTypes.length)];

        try {
          const res = await fetch(
            `${API_BASE}/event?sku_id=${product.sku_id}&event_type=${eventType}&user_id=${userId.current}&session_id=${sessionId.current}`,
            { method: "POST" }
          );

          if (res.ok) {
            const data = await res.json();

            // Update price
            setProducts((prev) => prev.map((p) =>
              p.sku_id === product.sku_id
                ? { ...p, current_price: data.new_price, clicks: data.demand_clicks, inventory: data.inventory }
                : p
            ));

            // Flash effect
            setFlashStates((prev) => ({ ...prev, [product.sku_id]: data.direction === "up" ? "up" : data.direction === "down" ? "down" : null }));
            setTimeout(() => setFlashStates((prev) => ({ ...prev, [product.sku_id]: null })), 2500);

            // Update rationale
            setRationale(data.rationale || []);

            // Update recommendations
            if (data.recommendations) {
              const oldIds = new Set(recommendations.map((r) => r.sku_id));
              const freshIds = new Set(data.recommendations.map((r) => r.sku_id).filter((id) => !oldIds.has(id)));
              setRecommendations(data.recommendations);
              setNewRecIds(freshIds);
              setTimeout(() => setNewRecIds(new Set()), 3000);
            }

            // Track latency
            latencies.current.push(data.latency_ms);
            if (latencies.current.length > 20) latencies.current.shift();
            setAvgLatency(Math.round(latencies.current.reduce((a, b) => a + b, 0) / latencies.current.length));

            // Event log
            setEventLog((prev) => [...prev, {
              product_name: data.product_name,
              direction: data.direction,
              latency_ms: data.latency_ms,
              ab_group: data.ab_group,
              event_type: eventType,
            }].slice(-20));

            // Last action
            const arrow = data.direction === "up" ? "▲" : data.direction === "down" ? "▼" : "─";
            setLastAction(`${eventType}: ${data.product_name.substring(0, 20)} $${data.old_price.toFixed(2)} → $${data.new_price.toFixed(2)} ${arrow} [${data.ab_group}]`);
          }
        } catch (e) {
          console.warn("Event failed:", e);
        } finally {
          setLoading(false);
        }
      }, [products, recommendations, loading]);

      // ── Simulate random click ──
      const simulateClick = useCallback(() => {
        if (products.length === 0) return;
        const randomProduct = products[Math.floor(Math.random() * products.length)];
        clickProduct(randomProduct);
      }, [products, clickProduct]);

      // ── Fetch analytics ──
      const fetchAnalytics = useCallback(async () => {
        try {
          const res = await fetch(`${API_BASE}/analytics`);
          if (res.ok) {
            setAnalytics(await res.json());
          }
        } catch (e) { }
      }, []);

      useEffect(() => {
        if (simCount > 0 && simCount % 3 === 0) fetchAnalytics();
      }, [simCount, fetchAnalytics]);

      const avgPrice = products.length > 0
        ? (products.reduce((s, p) => s + p.current_price, 0) / products.length).toFixed(0)
        : "—";

      if (initialLoading) {
        return (
          <div className="min-h-screen font-outfit text-white flex items-center justify-center" style={{ background: "#0a0a12" }}>
            <div className="text-center">
              <div className="spinner mx-auto mb-4" style={{ width: 32, height: 32 }}></div>
              <p className="text-white/40 text-sm">Loading APEX Engine...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen font-outfit text-white" style={{ background: "#0a0a12" }}>

          {/* ── Header ── */}
          <header className="sticky top-0 z-50 flex items-center justify-between px-5 py-3" style={{ borderBottom: "1px solid rgba(255,255,255,0.06)", background: "rgba(10,10,18,0.88)", backdropFilter: "blur(14px)" }}>
            <div className="flex items-center gap-3">
              <div className="w-7 h-7 rounded-md flex items-center justify-center text-sm" style={{ background: "linear-gradient(135deg, #e2b96f, #c8973e)" }}>◈</div>
              <span className="font-playfair text-lg text-gold">APEX</span>
              <span className="text-[10px] text-white/25 tracking-[0.15em] hidden sm:inline">DYNAMIC PRICING ENGINE</span>
            </div>

            <div className="flex items-center gap-3">
              {lastAction && (
                <span className="text-[10px] text-white/30 font-mono hidden lg:inline truncate max-w-xs">
                  {lastAction}
                </span>
              )}

              {/* Latency indicator */}
              <div className="hidden sm:flex items-center gap-1.5 px-2 py-1 rounded-lg" style={{ background: "rgba(74,222,128,0.05)", border: "1px solid rgba(74,222,128,0.1)" }}>
                <div className="w-1.5 h-1.5 rounded-full" style={{ background: avgLatency < 200 ? "#4ade80" : "#f87171" }} />
                <span className="text-[10px] font-mono" style={{ color: avgLatency < 200 ? "#4ade80" : "#f87171" }}>
                  {avgLatency || "—"}ms
                </span>
              </div>

              {/* Run counter */}
              <div className="text-right">
                <p className="text-[8px] text-white/20 tracking-[0.1em] m-0 leading-none">EVENTS</p>
                <p className="text-base font-mono text-gold font-medium m-0 leading-tight">{String(simCount).padStart(3, "0")}</p>
              </div>

              {/* Simulate Button */}
              <button
                id="simulate-btn"
                className="sim-btn rounded-xl px-4 py-2 text-[12px] font-semibold tracking-wide border-none flex items-center gap-2"
                onClick={simulateClick}
                disabled={loading || products.length === 0}
                style={{
                  background: loading ? "rgba(226,185,111,0.1)" : "linear-gradient(135deg, #e2b96f 0%, #c8973e 100%)",
                  color: loading ? "rgba(226,185,111,0.5)" : "#0a0a12",
                  cursor: loading ? "not-allowed" : "pointer",
                  fontFamily: "Outfit, sans-serif",
                }}
              >
                {loading && <div className="spinner" />}
                {loading ? "Processing…" : "⚡ Simulate Click"}
              </button>
            </div>
          </header>

          {/* ── Main ── */}
          <div className="max-w-screen-xl mx-auto px-5 pt-5 pb-12">
            <div className="grid gap-5 items-start" style={{ gridTemplateColumns: "1fr 300px" }}>

              {/* ── Product Grid ── */}
              <section>
                <div className="flex items-center justify-between mb-4">
                  <div>
                    <h1 className="text-[12px] tracking-[0.15em] text-white/30 font-medium m-0">PRODUCT CATALOG</h1>
                    <p className="text-lg font-semibold text-white mt-0.5 m-0">{products.length} Products · Real Data</p>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <div className="w-1.5 h-1.5 rounded-full" style={{ background: connected ? "#4ade80" : "#f87171", boxShadow: connected ? "0 0 4px rgba(74,222,128,0.6)" : "0 0 4px rgba(248,113,113,0.6)" }} />
                    <span className="text-[10px] text-white/25 font-mono">{connected ? "localhost:8000" : "connected"}</span>
                  </div>
                </div>

                {products.length === 0 ? (
                  <div className="text-center py-12">
                    <p className="text-white/30 text-sm">No products loaded. Start the backend: <code className="text-gold/60">python server.py</code></p>
                  </div>
                ) : (
                  <div className="grid gap-3" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(170px, 1fr))" }}>
                    {products.map((product, i) => (
                      <ProductCard
                        key={product.sku_id}
                        product={product}
                        index={i}
                        isClicked={product.sku_id === clickedId}
                        flashState={flashStates[product.sku_id] ?? null}
                        onClick={clickProduct}
                      />
                    ))}
                  </div>
                )}

                {/* Price Rationale (below grid) */}
                <RationaleBox rationale={rationale} />
              </section>

              {/* ── Sidebar ── */}
              <aside className="sticky top-16">
                {/* Tab Navigation */}
                <div className="flex gap-4 mb-3 border-b" style={{ borderColor: "rgba(255,255,255,0.06)" }}>
                  <button
                    className={`text-[11px] tracking-[0.1em] font-semibold pb-2 transition-colors ${activeTab === "recs" ? "tab-active" : "tab-inactive"}`}
                    onClick={() => setActiveTab("recs")}
                  >
                    AI PICKS
                  </button>
                  <button
                    className={`text-[11px] tracking-[0.1em] font-semibold pb-2 transition-colors ${activeTab === "analytics" ? "tab-active" : "tab-inactive"}`}
                    onClick={() => { setActiveTab("analytics"); fetchAnalytics(); }}
                  >
                    ANALYTICS
                  </button>
                </div>

                {activeTab === "recs" ? (
                  <>
                    <p className="text-lg font-semibold text-white mt-1 mb-3 m-0">Recommended For You</p>
                    <div className="flex flex-col gap-1.5">
                      {recommendations.length > 0 ? recommendations.map((rec, i) => (
                        <RecommendationCard key={rec.sku_id || i} rec={rec} index={i} isNew={newRecIds.has(rec.sku_id)} />
                      )) : (
                        <p className="text-[11px] text-white/20 py-4">Click a product to get recommendations</p>
                      )}
                    </div>
                  </>
                ) : (
                  <>
                    <p className="text-lg font-semibold text-white mt-1 mb-3 m-0">Live Analytics</p>
                    <ABTestPanel analytics={analytics} />
                  </>
                )}

                {/* Stats */}
                <div className="grid grid-cols-2 gap-2 mt-4">
                  <StatBox label="AVG PRICE" value={`$${avgPrice}`} />
                  <StatBox label="LATENCY" value={`${avgLatency}ms`} color={avgLatency < 200 ? "#4ade80" : "#f87171"} />
                  <StatBox label="EVENTS" value={simCount} />
                  <StatBox label="SESSION" value={sessionId.current.slice(0, 5)} />
                </div>

                {/* Event Log */}
                <EventLog events={eventLog} />

                {/* System Architecture Info */}
                <div className="mt-3 px-3 py-2.5 rounded-lg" style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)" }}>
                  <p className="text-[9px] tracking-[0.1em] text-white/20 font-semibold mb-1.5 m-0">SYSTEM</p>
                  <div className="flex flex-col gap-1">
                    <p className="text-[10px] text-white/30 m-0">📊 In-memory Python dict store</p>
                    <p className="text-[10px] text-white/30 m-0">⚡ Sub-200ms pricing pipeline</p>
                    <p className="text-[10px] text-white/30 m-0">🛡️ Hard price ceiling: +15%</p>
                    <p className="text-[10px] text-white/30 m-0">🧪 A/B: Static vs Dynamic pricing</p>
                    <p className="text-[10px] text-white/30 m-0">🤖 Session-based recommendations</p>
                  </div>
                </div>
              </aside>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>

</html>
