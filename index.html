    rel="stylesheet" />

  <!-- Tailwind CSS -->

    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            outfit: ["Outfit", "sans-serif"],
            playfair: ["Playfair Display", "serif"],
            mono: ["DM Mono", "monospace"],
          },
          colors: {
            gold: { DEFAULT: "#e2b96f", dark: "#c8973e", light: "#f0d49a" },
            surface: { DEFAULT: "#080810", card: "rgba(255,255,255,0.03)", border: "rgba(255,255,255,0.07)" },
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'shimmer': 'shimmer 2s linear infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
          }
        },
      },
    };
  </script>

  <!-- AOS — Animate on Scroll -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    :root {
      --gold: #e2b96f;
      --gold-dark: #c8973e;
      --gold-light: #f0d49a;
      --bg: #080810;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      overflow-x: hidden;
      font-family: 'Outfit', sans-serif;
      color: #fff;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(226, 185, 111, 0.25);
      border-radius: 4px;
    }

    /* ── Three.js Canvas ── */
    #three-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Hero ── */
    .hero-section {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(226, 185, 111, 0.12) 0%, transparent 70%),
        linear-gradient(180deg, #080810 0%, #0a0a18 100%);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(226, 185, 111, 0.08);
      border: 1px solid rgba(226, 185, 111, 0.25);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 12px;
      color: var(--gold-light);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      backdrop-filter: blur(8px);
    }

    .hero-badge .dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.8);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(0.85);
      }
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--gold) 70%, var(--gold-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      border: none;
      outline: none;
    }

    .hero-cta-primary {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: #080810;
      box-shadow: 0 8px 32px rgba(226, 185, 111, 0.35);
    }

    .hero-cta-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(226, 185, 111, 0.45);
    }

    .hero-cta-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
    }

    .hero-cta-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
    }

    /* ── Floating stats in hero ── */
    .hero-stat-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px 20px;
      backdrop-filter: blur(20px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(226, 185, 111, 0.4), transparent);
    }

    /* ── Marquee ── */
    .marquee-wrapper {
      overflow: hidden;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.015);
      padding: 14px 0;
    }

    .marquee-track {
      display: flex;
      gap: 60px;
      animation: marquee 30s linear infinite;
      width: max-content;
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    .marquee-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .marquee-item span {
      color: var(--gold);
      font-size: 16px;
    }

    /* ── Section ── */
    .section-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      background: linear-gradient(135deg, #fff 60%, rgba(255, 255, 255, 0.6));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Product Card (upgraded) ── */
    .product-card {
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        border-color 0.3s ease,
        box-shadow 0.4s ease;
      cursor: pointer;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(226, 185, 111, 0.4);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(226, 185, 111, 0.15), 0 8px 32px rgba(226, 185, 111, 0.12);
    }

    .product-img-wrapper {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1;
    }

    .product-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .product-card:hover .product-img-wrapper img {
      transform: scale(1.08);
    }

    .product-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(8, 8, 16, 0.85) 0%, rgba(8, 8, 16, 0.2) 40%, transparent 70%);
    }

    .product-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 99px;
      backdrop-filter: blur(12px);
    }

    .product-badge-selected {
      background: rgba(226, 185, 111, 0.9);
      color: #080810;
    }

    .product-badge-hot {
      background: rgba(239, 68, 68, 0.85);
      color: #fff;
    }

    .product-badge-new {
      background: rgba(74, 222, 128, 0.85);
      color: #080810;
    }

    .product-wishlist {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .product-wishlist:hover {
      background: rgba(255, 60, 60, 0.25);
      transform: scale(1.1);
    }

    .product-category-tag {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
    }

    .add-to-cart-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: #080810;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .add-to-cart-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .add-to-cart-btn:active {
      transform: scale(0.98);
    }

    /* ── Price animations ── */
    @keyframes priceUp {
      0% {
        transform: scale(1.25);
        color: #4ade80;
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes priceDown {
      0% {
        transform: scale(1.25);
        color: #f87171;
      }

      100% {
        transform: scale(1);
      }
    }

    .price-flash-up {
      animation: priceUp 0.5s ease-out;
    }

    .price-flash-down {
      animation: priceDown 0.5s ease-out;
    }

    @keyframes flashGreen {
      0% {
        box-shadow: inset 0 0 0 2px rgba(74, 222, 128, 0.7);
      }

      100% {
        box-shadow: inset 0 0 0 2px transparent;
      }
    }

    @keyframes flashRed {
      0% {
        box-shadow: inset 0 0 0 2px rgba(248, 113, 113, 0.7);
      }

      100% {
        box-shadow: inset 0 0 0 2px transparent;
      }
    }

    .flash-up {
      animation: flashGreen 2.5s ease-out;
    }

    .flash-down {
      animation: flashRed 2.5s ease-out;
    }

    /* ── Spinner ── */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(226, 185, 111, 0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Sim buttons ── */
    .sim-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
    }

    .sim-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sim-btn:hover::after {
      opacity: 1;
    }

    .sim-btn:active {
      transform: scale(0.96) !important;
    }

    /* ── Rec card ── */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(16px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .rec-new {
      animation: slideIn 0.45s ease-out;
    }

    /* ── Trending ── */
    @keyframes pulse-trend {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    .trending-badge {
      animation: pulse-trend 1.8s ease-in-out infinite;
    }

    /* ── Nav ── */
    .nav-link {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      padding: 4px 0;
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.25s ease;
    }

    .nav-link:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    .nav-link:hover::after {
      transform: scaleX(1);
    }

    /* ── Category pills ── */
    .category-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .category-pill:hover,
    .category-pill.active {
      background: rgba(226, 185, 111, 0.1);
      border-color: rgba(226, 185, 111, 0.35);
      color: var(--gold);
    }

    /* ── Features Section ── */
    .feature-card {
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 32px;
      position: relative;
      overflow: hidden;
      transition: all 0.35s ease;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(226, 185, 111, 0.3), transparent);
      opacity: 0;
      transition: opacity 0.35s;
    }

    .feature-card:hover {
      border-color: rgba(226, 185, 111, 0.2);
      transform: translateY(-4px);
    }

    .feature-card:hover::before {
      opacity: 1;
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    /* ── Testimonial ── */
    .testimonial-card {
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 20px;
      padding: 28px;
      transition: all 0.3s ease;
    }

    .testimonial-card:hover {
      border-color: rgba(226, 185, 111, 0.2);
      transform: translateY(-4px);
    }

    /* ── Footer ── */
    .footer-link {
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }

    .footer-link:hover {
      color: var(--gold);
    }

    /* ── Glassmorphism panel ── */
    .glass-panel {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
    }

    /* ── Number counter animation ── */
    .count-up {
      display: inline-block;
    }

    /* ── Gradient divider ── */
    .gradient-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(226, 185, 111, 0.25), transparent);
      border: none;
      margin: 0;
    }

    /* ── Cart badge ── */
    .cart-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: var(--gold);
      color: #080810;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      background: rgba(15, 15, 25, 0.95);
      border: 1px solid rgba(226, 185, 111, 0.3);
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      animation: toastIn 0.35s ease-out;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .toast-icon {
      font-size: 18px;
    }

    /* AOS overrides */
    [data-aos] {
      pointer-events: none;
    }

    [data-aos].aos-animate {
      pointer-events: auto;
    }
  </style>
</head>

    /* ─────────────── THREE.JS INIT ─────────────── */

    function initThree(canvas) {
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
      camera.position.z = 5;

      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(canvas.clientWidth, canvas.clientHeight);
      renderer.setClearColor(0x000000, 0);

      // Particles
      const particleCount = 200;
      const positions = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);

      for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 20;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
        sizes[i] = Math.random() * 3 + 1;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setAttribute("size", new THREE.BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        color: 0xe2b96f,
        size: 0.06,
        transparent: true,
        opacity: 0.45,
        sizeAttenuation: true,
      });

      const particles = new THREE.Points(geo, mat);
      scene.add(particles);

      // Floating geometric shapes
      const shapes = [];
      const shapeGeo = [
        new THREE.TetrahedronGeometry(0.3),
        new THREE.OctahedronGeometry(0.25),
        new THREE.IcosahedronGeometry(0.22),
      ];
      const shapeMat = new THREE.MeshBasicMaterial({
        color: 0xe2b96f,
        wireframe: true,
        transparent: true,
        opacity: 0.15,
      });

      for (let i = 0; i < 8; i++) {
        const mesh = new THREE.Mesh(shapeGeo[i % shapeGeo.length], shapeMat);
        mesh.position.set(
          (Math.random() - 0.5) * 16,
          (Math.random() - 0.5) * 10,
          (Math.random() - 0.5) * 5
        );
        mesh.userData = {
          rotX: (Math.random() - 0.5) * 0.01,
          rotY: (Math.random() - 0.5) * 0.01,
          floatSpeed: Math.random() * 0.003 + 0.001,
          floatOffset: Math.random() * Math.PI * 2,
        };
        scene.add(mesh);
        shapes.push(mesh);
      }

      let frame = 0;
      let animId;

      function animate() {
        animId = requestAnimationFrame(animate);
        frame++;

        particles.rotation.y = frame * 0.0003;
        particles.rotation.x = frame * 0.0001;

        shapes.forEach((s) => {
          s.rotation.x += s.userData.rotX;
          s.rotation.y += s.userData.rotY;
          s.position.y += Math.sin(frame * s.userData.floatSpeed + s.userData.floatOffset) * 0.003;
        });

        renderer.render(scene, camera);
      }
      animate();

      function onResize() {
        const w = canvas.clientWidth, h = canvas.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
      window.addEventListener("resize", onResize);

      return () => {
        cancelAnimationFrame(animId);
        window.removeEventListener("resize", onResize);
        renderer.dispose();
      };
    }

                className="sim-btn hidden sm:flex rounded-xl px-4 py-2 text-[12px] font-semibold items-center gap-1.5 border-none"
                onClick={() => setShowLogin(true)}
                style={{ background: "rgba(255,255,255,0.05)", color: "#e2b96f", border: "1px solid rgba(226,185,111,0.25)", fontFamily: "Outfit,sans-serif", cursor: "pointer" }}
              >
                🔐 Login
              </button>

              {/* Simulate */}
              <button
                id="simulate-btn"
                className="sim-btn rounded-xl px-4 py-2.5 text-[12px] font-semibold border-none flex items-center gap-2"
                onClick={simulateClick}
                disabled={loading}
                style={{
                  background: loading ? "rgba(226,185,111,0.1)" : "linear-gradient(135deg, #e2b96f 0%, #c8973e 100%)",
                  color: loading ? "rgba(226,185,111,0.5)" : "#080810",
                  cursor: loading ? "not-allowed" : "pointer",
                  fontFamily: "Outfit, sans-serif",
                }}
              >
                {loading && <div className="spinner" />}
                {loading ? "Processing…" : "⚡ Simulate"}
              </button>
            </div>
          </nav>

          {/* ── HERO ── */}
          <HeroSection onScrollToProducts={scrollToProducts} />

          {/* ── MARQUEE TICKER ── */}
          <div className="marquee-wrapper">
            <div className="marquee-track">
              {[...Array(2)].map((_, rep) =>
                ["🎧 Free Shipping Over ₹999", "⚡ Dynamic Pricing Active", "🤖 AI Recommendations Live", "🔥 Today's Deals — Up to 40% Off", "🚀 Same-Day Delivery Available", "💎 Premium Tech, Curated for You"].map((item, i) => (
                  <div key={`${rep}-${i}`} className="marquee-item">
                    <span>·</span> {item}
                  </div>
                ))
              )}
            </div>
          </div>

          {/* ── FEATURES ── */}
          <section className="py-20 px-6 max-w-screen-xl mx-auto" id="features">
            <div className="text-center mb-14" data-aos="fade-up">
              <span className="section-label">Why Smart Shop?</span>
              <h2 className="section-title">Built for the Modern Shopper</h2>
              <p className="mt-3 max-w-lg mx-auto" style={{ color: "rgba(255,255,255,0.4)", fontSize: 15, lineHeight: 1.7 }}>
                We combine AI, real-time data, and a curated catalog to give you an unmatched shopping experience.
              </p>
            </div>

            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
              {FEATURES.map((f, i) => (
                <div key={f.title} className="feature-card" data-aos="fade-up" data-aos-delay={i * 80}>
                  <div className="feature-icon" style={{ background: f.gradient }}>
                    {f.icon}
                  </div>
                  <h3 className="text-[15px] font-semibold text-white/90 mb-2">{f.title}</h3>
                  <p className="text-[13px] leading-relaxed m-0" style={{ color: "rgba(255,255,255,0.4)" }}>{f.desc}</p>
                </div>
              ))}
            </div>
          </section>

          <hr className="gradient-divider" />

          {/* ── PRODUCTS ── */}
          <section className="py-20 px-6 max-w-screen-xl mx-auto" ref={productsRef} id="products">
            <div className="flex flex-col lg:flex-row gap-8 items-start">

              {/* Main column */}
              <div className="flex-1 min-w-0">
                {/* Header */}
                <div className="flex items-end justify-between mb-6 flex-wrap gap-4" data-aos="fade-up">
                  <div>
                    <span className="section-label">Live Catalog</span>
                    <h2 className="section-title m-0">
                      {filteredProducts.length} {activeCategory !== "All" ? activeCategory : ""} Products
                    </h2>
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full" style={{ background: "#4ade80", boxShadow: "0 0 6px rgba(74,222,128,0.8)" }} />
                    <span className="text-[11px] font-mono" style={{ color: "rgba(255,255,255,0.3)" }}>Dynamic pricing active</span>
                  </div>
                </div>

                {/* Category pills */}
                <div className="flex gap-2 mb-8 overflow-x-auto pb-2" data-aos="fade-up" data-aos-delay="80">
                  {CATEGORIES.map((cat) => (
                    <button
                      key={cat}
                      className={`category-pill ${activeCategory === cat ? "active" : ""}`}
                      onClick={() => setActiveCategory(cat)}
                    >
                      {cat}
                    </button>
                  ))}
                </div>

                {/* Grid */}
                <div className="grid gap-5" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(210px, 1fr))" }}>
                  {filteredProducts.map((product, i) => (
                    <div key={product.id} data-aos="fade-up" data-aos-delay={i * 50}>
                      <ProductCard
                        product={product}
                        isSelected={product.id === selectedId}
                        flashState={flashStates[product.id] ?? null}
                        onSelect={setSelectedId}
                        onCart={handleCart}
                      />
                    </div>
                  ))}
                </div>
              </div>

              {/* Sidebar */}
              <aside className="w-full lg:w-72 flex-shrink-0 sticky top-20" data-aos="fade-left" data-aos-delay="100">

                {/* AI Picks */}
                <div className="mb-4">
                  <span className="section-label" style={{ fontSize: 10 }}>AI-Powered</span>
                  <h3 className="text-[18px] font-semibold text-white m-0">Recommended for You</h3>
                </div>

                <div className="flex flex-col gap-2 mb-5">
                  {recommendations.map((rec, i) => (
                    <RecommendationCard key={rec.id} product={rec} isNew={newRecIds.has(rec.id)} />
                  ))}
                </div>

                {/* Stats grid */}
                <div className="grid grid-cols-2 gap-2 mb-4">
                  <StatBox label="AVG PRICE" value={formatPrice(avgPrice)} icon="📊" />
                  <StatBox label="UPDATES" value={simCount} icon="⚡" />
                  <StatBox label="PRODUCTS" value={products.length} icon="📦" />
                  <StatBox label="TRENDING" value={Object.values(flashStates).filter(v => v === "up").length} icon="🔥" />
                </div>

                {/* Live status */}
                <div className="rounded-xl px-3 py-3 flex items-center gap-2.5"
                  style={{ background: "rgba(74,222,128,0.04)", border: "1px solid rgba(74,222,128,0.12)" }}>
                  <div className="w-2 h-2 rounded-full flex-shrink-0"
                    style={{ background: "#4ade80", boxShadow: "0 0 6px rgba(74,222,128,0.8)" }} />
                  <div>
                    <p className="text-[11px] text-green-400/80 font-semibold m-0">Live simulation active</p>
                    <p className="text-[10px] m-0" style={{ color: "rgba(255,255,255,0.2)" }}>API fallback: mock mode</p>
                  </div>
                </div>

                {/* Deal of Day */}
                <div className="mt-4 rounded-2xl overflow-hidden" style={{ border: "1px solid rgba(226,185,111,0.2)" }}>
                  <img src={PRODUCTS[3].img} alt="Deal" className="w-full h-32 object-cover" />
                  <div className="p-4" style={{ background: "rgba(226,185,111,0.05)" }}>
                    <p className="text-[10px] font-bold tracking-[0.15em] text-gold m-0 mb-1">⏱ DEAL OF THE DAY</p>
                    <p className="text-[13px] font-semibold text-white/90 m-0">{PRODUCTS[3].name}</p>
                    <div className="flex items-center justify-between mt-2">
                      <span className="text-base font-bold font-mono" style={{ color: "#e2b96f" }}>{formatPrice(PRODUCTS[3].price)}</span>
                      <span className="text-[10px] font-bold text-green-400 bg-green-400/10 px-2 py-0.5 rounded">
                        SAVE {Math.round(((PRODUCTS[3].originalPrice - PRODUCTS[3].price) / PRODUCTS[3].originalPrice) * 100)}%
                      </span>
                    </div>
                  </div>
                </div>
              </aside>
            </div>
          </section>

          <hr className="gradient-divider" />

          {/* ── TESTIMONIALS ── */}
          <section className="py-20 px-6 max-w-screen-xl mx-auto" id="testimonials">
            <div className="text-center mb-14" data-aos="fade-up">
              <span className="section-label">Social Proof</span>
              <h2 className="section-title">What Our Customers Say</h2>
            </div>

            <div className="grid sm:grid-cols-3 gap-6">
              {TESTIMONIALS.map((t, i) => (
                <div key={t.name} className="testimonial-card" data-aos="fade-up" data-aos-delay={i * 100}>
                  <div className="flex items-center gap-3 mb-4">
                    <img src={t.avatar} alt={t.name} className="w-11 h-11 rounded-full object-cover" />
                    <div>
                      <p className="text-[13px] font-semibold text-white/90 m-0">{t.name}</p>
                      <p className="text-[11px] m-0" style={{ color: "rgba(255,255,255,0.35)" }}>{t.role}</p>
                    </div>
                    <div className="ml-auto">
                      <Stars count={t.stars} />
                    </div>
                  </div>
                  <p className="text-[13px] leading-relaxed m-0" style={{ color: "rgba(255,255,255,0.55)" }}>"{t.text}"</p>
                </div>
              ))}
            </div>
          </section>

          <hr className="gradient-divider" />

          {/* ── FOOTER ── */}
          <footer className="py-12 px-6 max-w-screen-xl mx-auto">
            <div className="flex flex-col md:flex-row items-center justify-between gap-6">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold"
                  style={{ background: "linear-gradient(135deg, #e2b96f, #c8973e)", color: "#080810" }}>◈</div>
                <span className="font-playfair text-lg" style={{ color: "#f8e2a4" }}>Smart Shop</span>
              </div>

              <div className="flex flex-wrap gap-6 justify-center">
                {["Privacy Policy", "Terms of Service", "Shipping", "Returns", "Contact Us"].map((l) => (
                  <a key={l} href="#" className="footer-link">{l}</a>
                ))}
              </div>

              <p className="text-[12px] m-0" style={{ color: "rgba(255,255,255,0.2)" }}>
                © 2026 Smart Shop. All rights reserved.
              </p>
            </div>
          </footer>

          {/* ── LOGIN MODAL ── */}
          {showLogin && (
            <div className="fixed inset-0 z-50 flex items-center justify-center"
              style={{ background: "rgba(8,8,16,0.85)", backdropFilter: "blur(12px)" }}>
              <div className="rounded-2xl p-8 max-w-md w-full mx-4 relative"
                style={{ background: "rgba(15,15,25,0.97)", border: "1px solid rgba(255,255,255,0.08)", boxShadow: "0 32px 80px rgba(0,0,0,0.7)" }}>
                <button onClick={() => setShowLogin(false)}
                  className="absolute top-4 right-4"
                  style={{ color: "rgba(255,255,255,0.3)", background: "none", border: "none", cursor: "pointer", fontSize: 18 }}>✕</button>

                <div className="text-center mb-7">
                  <div className="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl"
                    style={{ background: "linear-gradient(135deg, #e2b96f, #c8973e)" }}>🔐</div>
                  <h2 className="text-xl font-playfair m-0 mb-1" style={{ color: "#e2b96f" }}>Welcome Back</h2>
                  <p className="text-[13px] m-0" style={{ color: "rgba(255,255,255,0.4)" }}>Sign in to your Smart Shop account</p>
                </div>

                <form className="space-y-4" onSubmit={(e) => { e.preventDefault(); setShowLogin(false); setToast("Logged in successfully! 🎉"); }}>
                  {["Email or Mobile Number", "Password"].map((label, i) => (
                    <div key={label}>
                      <label className="block text-[12px] font-medium mb-1.5" style={{ color: "rgba(255,255,255,0.6)" }}>{label}</label>
                      <input
                        type={i === 1 ? "password" : "text"}
                        placeholder={i === 0 ? "you@example.com" : "••••••••"}
                        className="w-full px-4 py-3 rounded-xl text-white text-[13px] outline-none transition-all"
                        style={{
                          background: "rgba(255,255,255,0.04)",
                          border: "1px solid rgba(255,255,255,0.08)",
                          fontFamily: "Outfit, sans-serif",
                        }}
                        onFocus={(e) => e.target.style.borderColor = "rgba(226,185,111,0.4)"}
                        onBlur={(e) => e.target.style.borderColor = "rgba(255,255,255,0.08)"}
                      />
                    </div>
                  ))}

                  <div className="flex items-center justify-between text-[12px]">
                    <label className="flex items-center gap-2" style={{ color: "rgba(255,255,255,0.5)", cursor: "pointer" }}>
                      <input type="checkbox" className="rounded" /> Remember me
                    </label>
                    <a href="#" style={{ color: "#e2b96f", textDecoration: "none" }}>Forgot password?</a>
                  </div>

                  <button type="submit" className="w-full py-3 rounded-xl font-semibold text-[13px] tracking-wide border-none cursor-pointer transition-all"
                    style={{ background: "linear-gradient(135deg, #e2b96f 0%, #c8973e 100%)", color: "#080810", fontFamily: "Outfit, sans-serif" }}>
                    Sign In
                  </button>

                  <p className="text-center text-[12px] m-0" style={{ color: "rgba(255,255,255,0.4)" }}>
                    No account? <a href="#" style={{ color: "#e2b96f", textDecoration: "none" }}>Sign up free →</a>
                  </p>
                </form>
              </div>
            </div>
          )}

          {/* ── TOAST ── */}
          {toast && <Toast message={toast} onClose={() => setToast(null)} />}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>

</html>
